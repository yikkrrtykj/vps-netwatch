debug: false
httpport: 80
language: vpsnw_language
grpcport: vpsnw_grpc_port
oauth2:
  type: "vpsnw_oauth2_type" #Oauth2 登录接入类型，github/gitlab/jihulab/gitee/gitea
  admin: "vpsnw_admin_logins" #管理员列表，半角逗号隔开
  clientid: "vpsnw_github_oauth_client_id" # 在 https://github.com/settings/developers 创建，无需审核 Callback 填 http(s)://域名或IP/oauth2/callback
  clientsecret: "vpsnw_github_oauth_client_secret"
  endpoint: "" # 如gitea自建需要设置
site:
  brand: "vpsnw_site_title"
  cookiename: "vps-netwatch" #浏览器 Cookie 字段名，可不改
  theme: "default"
