<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8fafc">
  <title>vps-netwatch</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f8fafc}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#f8fafc 0,#eef2ff 100%);color:#0f172a}
    .shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 48px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}.mark{width:34px;height:34px;border-radius:8px;background:#2563eb;color:white;display:grid;place-items:center;font-weight:900}.brand h1{font-size:22px;margin:0}.brand p{margin:3px 0 0;color:#64748b;font-size:13px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #cbd5e1;border-radius:7px;background:white;color:#0f172a;text-decoration:none;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer}.btn.primary{background:#2563eb;border-color:#2563eb;color:white}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.stat{border:1px solid #e2e8f0;border-radius:8px;background:rgba(255,255,255,.82);padding:13px 14px;box-shadow:0 10px 28px rgba(15,23,42,.06)}.stat span{display:block;color:#64748b;font-size:12px}.stat b{display:block;margin-top:6px;font-size:22px}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:16px 0}.toolbar h2{font-size:16px;margin:0}.seg{display:flex;border:1px solid #cbd5e1;border-radius:999px;background:white;padding:3px}.seg button{border:0;border-radius:999px;background:transparent;padding:7px 12px;font-weight:800;color:#64748b;cursor:pointer}.seg button.active{background:#2563eb;color:white}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.card{border:1px solid #e2e8f0;border-radius:8px;background:white;padding:14px;box-shadow:0 12px 30px rgba(15,23,42,.07)}.node{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}.node strong{font-size:14px}.dot{width:9px;height:9px;border-radius:99px;background:#ef4444;display:inline-block;margin-right:7px}.dot.online{background:#22c55e}.sub{color:#64748b;font-size:12px;margin-top:4px}.pills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.pill{border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:800;padding:5px 8px}.pill.green{background:#ecfdf5;color:#047857}.pill.gray{background:#f1f5f9;color:#475569}.meters{display:grid;gap:8px}.meter label{display:flex;justify-content:space-between;color:#64748b;font-size:12px}.bar{height:5px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:4px}.bar i{display:block;height:100%;background:#60a5fa}.bar.mem i{background:#a78bfa}.bar.disk i{background:#f59e0b}.speed{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid #e2e8f0;margin-top:12px;padding-top:11px}.speed span{display:block;color:#64748b;font-size:12px}.speed b{font-size:13px}.up{color:#2563eb}.down{color:#16a34a}
    .tableWrap{display:none;overflow:auto;border:1px solid #e2e8f0;border-radius:8px;background:white;box-shadow:0 12px 30px rgba(15,23,42,.06)}table{width:100%;min-width:900px;border-collapse:collapse}th,td{padding:11px 12px;border-top:1px solid #e2e8f0;text-align:left;font-size:13px}th{border-top:0;background:#f8fafc;color:#64748b}.empty{border:1px dashed #cbd5e1;border-radius:8px;background:white;padding:36px;text-align:center;color:#64748b}.error{border-color:#fecaca;background:#fff1f2;color:#b91c1c}.hidden{display:none!important}
    @media(max-width:780px){.shell{width:min(100% - 20px,1180px);padding-top:16px}.top,.toolbar{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.speed{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="brand"><div class="mark">V</div><div><h1>vps-netwatch</h1><p id="subtitle">正在连接面板...</p></div></div>
      <nav class="actions"><button class="btn" id="refresh">刷新</button><a class="btn primary" href="/dashboard/login">登录后台</a></nav>
    </header>
    <section class="stats"><div class="stat"><span>在线服务器</span><b id="online">-</b></div><div class="stat"><span>服务器总数</span><b id="total">-</b></div><div class="stat"><span>实时上传</span><b id="up">-</b></div><div class="stat"><span>实时下载</span><b id="down">-</b></div></section>
    <section class="toolbar"><h2>服务器速览</h2><div class="seg"><button id="gridBtn" class="active">卡片</button><button id="tableBtn">表格</button></div></section>
    <section id="empty" class="empty">正在读取服务器数据...</section>
    <section id="grid" class="grid"></section>
    <section id="tableWrap" class="tableWrap"><table><thead><tr><th>节点</th><th>状态</th><th>CPU</th><th>内存</th><th>硬盘</th><th>剩余时间</th><th>最大带宽</th><th>实时网络速率</th><th>协议</th><th>总传输</th></tr></thead><tbody id="tbody"></tbody></table></section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id); let view = 'grid';
    function fmtBytes(v){let n=Math.max(0,Number(v)||0),u=['B','KiB','MiB','GiB','TiB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return (i? n<10?n.toFixed(2):n<100?n.toFixed(1):Math.round(n):Math.round(n))+' '+u[i]}
    function fmtRate(v){return fmtBytes(v)+'/s'} function pct(a,b){b=Number(b)||0;return b?Math.max(0,Math.min(100,(Number(a)||0)/b*100)):0} function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function protocols(s){const p=[]; if(s.ipv4)p.push('IPv4'); if(s.ipv6)p.push('IPv6'); if(!p.length&&s.ip)p.push(String(s.ip).includes(':')?'IPv6':'IPv4'); return p.length?p:['IP']}
    function meter(name,val,kind){return `<div class="meter"><label><span>${name}</span><b>${val.toFixed(1)}%</b></label><div class="bar ${kind}"><i style="width:${val}%"></i></div></div>`}
    function card(s){const mem=pct(s.mem_used,s.mem_total),disk=pct(s.disk_used,s.disk_total),cpu=Number(s.cpu)||0,ip=s.ip||s.ipv4||s.ipv6||'';return `<article class="card"><div class="node"><div><strong><span class="dot ${s.online?'online':''}"></span>${esc(s.name)}</strong><div class="sub">${esc(ip)}</div></div></div><div class="pills">${protocols(s).map(x=>`<span class="pill">${x}</span>`).join('')}<span class="pill green">${esc(s.bandwidth_label||'未设置带宽')}</span><span class="pill gray">${esc(s.remaining_label||'未设置剩余时间')}</span></div><div class="meters">${meter('CPU',cpu,'cpu')}${meter('内存',mem,'mem')}${meter('硬盘',disk,'disk')}</div><div class="speed"><div><span>实时上传</span><b class="up">↑ ${fmtRate(s.net_out_speed)}</b><span>累计 ${fmtBytes(s.net_out_transfer)}</span></div><div><span>实时下载</span><b class="down">↓ ${fmtRate(s.net_in_speed)}</b><span>累计 ${fmtBytes(s.net_in_transfer)}</span></div></div></article>`}
    function row(s){const mem=pct(s.mem_used,s.mem_total),disk=pct(s.disk_used,s.disk_total),cpu=Number(s.cpu)||0,ip=s.ip||s.ipv4||s.ipv6||'';return `<tr><td><strong>${esc(s.name)}</strong><div class="sub">${esc(ip)}</div></td><td>${s.online?'在线':'离线'}</td><td>${cpu.toFixed(1)}%</td><td>${mem.toFixed(1)}%</td><td>${disk.toFixed(1)}%</td><td>${esc(s.remaining_label||'未设置')}</td><td>${esc(s.bandwidth_label||'未设置')}</td><td><b class="up">↑ ${fmtRate(s.net_out_speed)}</b><br><b class="down">↓ ${fmtRate(s.net_in_speed)}</b></td><td>${protocols(s).join(' / ')}</td><td>↑ ${fmtBytes(s.net_out_transfer)}<br>↓ ${fmtBytes(s.net_in_transfer)}</td></tr>`}
    function setView(next){view=next;$('gridBtn').classList.toggle('active',view==='grid');$('tableBtn').classList.toggle('active',view==='table');$('grid').classList.toggle('hidden',view!=='grid');$('tableWrap').style.display=view==='table'?'block':'none'}
    async function load(){try{const r=await fetch('/api/v1/netwatch/latency?period=1d&servers_only=1&_='+Date.now(),{cache:'no-store'});const j=await r.json();if(!j.success)throw new Error(j.error||'读取失败');const servers=(j.data&&j.data.servers)||[];$('total').textContent=servers.length;$('online').textContent=servers.filter(s=>s.online).length;$('up').textContent=fmtRate(servers.reduce((a,s)=>a+(s.net_out_speed||0),0));$('down').textContent=fmtRate(servers.reduce((a,s)=>a+(s.net_in_speed||0),0));$('subtitle').textContent='面板已连接，最后更新 '+new Date().toLocaleTimeString();$('grid').innerHTML=servers.map(card).join('');$('tbody').innerHTML=servers.map(row).join('');$('empty').classList.toggle('hidden',servers.length>0);$('empty').classList.remove('error');$('empty').textContent=servers.length?'':'已连接面板，暂未接入服务器。接入 agent 后这里会显示卡片和表格。';setView(view)}catch(e){$('empty').classList.remove('hidden');$('empty').classList.add('error');$('empty').textContent='读取失败：'+(e.message||e)}}
    $('gridBtn').onclick=()=>setView('grid'); $('tableBtn').onclick=()=>setView('table'); $('refresh').onclick=load; load(); setInterval(load,5000);
  </script>
</body>
</html>
