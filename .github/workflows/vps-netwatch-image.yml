name: Build vps-netwatch image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build dashboard binary
    runs-on: ubuntu-latest
    container:
      image: goreleaser/goreleaser-cross:v1.26
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Install helper tools
        run: |
          apt update
          apt install unzip curl wget -y

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare frontend bundles
        run: |
          chmod +x ./script/fetch-frontends.sh
          ./script/fetch-frontends.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Generate swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init --pd -d cmd/dashboard -g main.go -o cmd/dashboard/docs
          go mod tidy

      - name: Build snapshot
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate --snapshot

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ./dist/*/*

  image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: ./assets

      - name: Prepare Docker context
        run: |
          chmod -R +x ./assets/*
          mkdir -p dist
          find ./assets -type f -name "dashboard-linux-*" -exec cp {} ./dist/ \;

      - name: Set image tags
        id: meta
        run: |
          image_name=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref_type }}" = "tag" ]; then
            {
              echo "tags<<EOF"
              echo "$image_name:latest"
              echo "$image_name:${{ github.ref_name }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "$image_name:main"
              echo "$image_name:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
