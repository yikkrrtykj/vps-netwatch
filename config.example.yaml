dashboard:
  # No domain is required. Use http://YOUR_DASHBOARD_IP:8787 first,
  # then change to https://your-domain after reverse proxy is ready.
  listen: "0.0.0.0:8787"
  public_url: "http://YOUR_DASHBOARD_IP:8787"
  data_path: "./data/vps-netwatch.db"

auth:
  # Must change. Use the same token on dashboard, agents, and collectors.
  token: "CHANGE_ME_TO_A_LONG_RANDOM_TOKEN"

# Optional. Only needed when you want to read mihomo/Clash connections
# from an internal proxy VM.
collectors:
  - id: "lan-proxy-vm"
    dashboard_url: "http://YOUR_DASHBOARD_IP:8787"
    interval: "10s"

# Optional local names/labels for agents. A new VPS can also run with
# `agent -id some-vps-id` without being pre-added here.
agents:
  - id: "main-vps"
    name: "Main VPS"
    dashboard_url: "http://YOUR_DASHBOARD_IP:8787"
    interval: "10s"
    labels:
      role: "dashboard"
  - id: "hk-vps-01"
    name: "HK VPS 01"
    dashboard_url: "http://YOUR_DASHBOARD_IP:8787"
    interval: "10s"
    labels:
      role: "proxy"

# Optional. Leave empty if you only need VPS monitoring.
mihomo:
  controllers: []

# Optional placeholder nodes before agents report.
vps_nodes: []

# Optional latency targets. Safe to leave empty for the first run.
probes:
  - name: "dashboard_8787"
    host: "YOUR_DASHBOARD_IP"
    port: 8787
    protocol: "tcp"
